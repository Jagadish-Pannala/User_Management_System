[pytest]

# Make Backend folder available for imports
pythonpath = Backend

# Where pytest should look for tests
testpaths = tests

# Async support for FastAPI
asyncio_mode = auto

# ── Markers ────────────────────────────────────────────────────────────────
# Run only a specific layer:
#   pytest -m unit
#   pytest -m integration
#   pytest -m contract

markers =
    unit: fast isolated tests — no DB, no HTTP (mocks only)
    integration: tests with real DB and real HTTP client
    contract: response shape / API contract verification

# ── Output ─────────────────────────────────────────────────────────────────
addopts =
    -v
    --tb=short
    --strict-markers