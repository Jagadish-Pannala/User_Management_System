version: "3.9"

services:

  mysql:
    image: mysql:8.0
    container_name: mysql_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: Jagadish@1711
      MYSQL_DATABASE: ums_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  ums:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ums_service
    env_file:
      - Backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - mysql
    restart: always

volumes:
  mysql_data: